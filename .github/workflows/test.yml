name: Test

on:
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
