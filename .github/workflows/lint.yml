name: Lint

on:
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "v2.12.2"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
